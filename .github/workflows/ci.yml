name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel any in-progress run for the same branch when a new commit is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  host-tests:
    name: Host Tests
    runs-on: ubuntu-latest
    permissions:
      checks: write  # required by dorny/test-reporter to publish results

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Submodules use SSH URLs in .gitmodules; actions/checkout rewrites
          # them to HTTPS automatically using the default GITHUB_TOKEN.
          submodules: recursive

      - name: Print build tool versions
        run: |
          gcc --version
          make --version

      - name: Run host tests
        run: |
          set -o pipefail
          make test | tee test-output.txt

      - name: Convert test output to JUnit XML
        if: always()
        run: python3 tests/unity_to_junit.py test-output.txt test-results.xml

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: Unity Tests
          path: test-results.xml
          reporter: java-junit
