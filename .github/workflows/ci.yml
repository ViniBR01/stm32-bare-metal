name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel any in-progress run for the same branch when a new commit is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  host-tests:
    name: Host Tests
    runs-on: ubuntu-latest
    permissions:
      checks: write  # required by dorny/test-reporter to publish results

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Submodules use SSH URLs in .gitmodules; actions/checkout rewrites
          # them to HTTPS automatically using the default GITHUB_TOKEN.
          submodules: recursive

      - name: Install Python signing dependencies
        run: pip3 install cryptography

      - name: Print build tool versions
        run: |
          gcc --version
          make --version

      - name: Run host tests
        run: |
          set -o pipefail
          make test | tee test-output.txt

      - name: Convert test output to JUnit XML
        if: always()
        run: python3 tests/unity_to_junit.py test-output.txt test-results.xml

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: Unity Tests
          path: test-results.xml
          reporter: java-junit

      - name: Install lcov
        run: sudo apt-get install -y --no-install-recommends lcov

      - name: Generate coverage report
        run: make -C tests coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: tests/coverage-html/

  firmware-build:
    name: Firmware Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install ARM toolchain
        run: sudo apt-get install -y --no-install-recommends gcc-arm-none-eabi libnewlib-arm-none-eabi

      - name: Install Python signing dependencies
        run: pip3 install cryptography

      - name: Print toolchain version
        run: arm-none-eabi-gcc --version

      - name: Build all firmware apps
        run: make all

  hil-tests:
    name: HIL Tests
    runs-on: [self-hosted, pi-hil]
    needs: host-tests
    permissions:
      checks: write  # required by dorny/test-reporter to publish results

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Print toolchain version
        run: arm-none-eabi-gcc --version

      - name: Verify Python signing dependencies
        run: python3 -c "import cryptography; import serial; print('deps OK')"

      - name: Run HIL tests
        run: python3 scripts/run_hil_tests.py --board ci --timeout 240 --baseline tests/baselines/performance.json --junit-xml hil-test-results.xml

      - name: Publish HIL test results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: HIL Tests
          path: hil-test-results.xml
          reporter: java-junit
          fail-on-error: false

      # Plan 001 Phase 1.5 — boot smoke test.
      # Flashes app_blinky_signed and asserts the bootloader → app jump
      # works end-to-end.  Runs after the cli_simple HIL pass so any
      # baseline regressions surface independently.
      - name: Run boot smoke test
        run: python3 scripts/run_boot_smoke_test.py --board ci --timeout 15 --junit-xml boot-smoke-results.xml

      - name: Publish boot smoke test results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Boot Smoke Test
          path: boot-smoke-results.xml
          reporter: java-junit
          fail-on-error: false

      # Plan 001 Phase 1.6 — verify-and-jump test.
      # Asserts that the bootloader's signature path accepts a clean
      # signed image and rejects a tampered one.  Runs after the boot
      # smoke test so a header-parse regression surfaces independently
      # of the verify path.
      - name: Run verify test
        run: python3 scripts/run_verify_test.py --board ci --timeout 20 --baseline tests/baselines/bootloader_verify.json --junit-xml verify-results.xml

      - name: Publish verify test results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Verify Test
          path: verify-results.xml
          reporter: java-junit
          fail-on-error: false
